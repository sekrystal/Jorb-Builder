        "detail": "1. Concise summary of exactly what changed\n\nAdded a dedicated `POST /search-runs/manual` API trigger that reuses the existing bounded sync path, committed it, and exposed it in OpenAPI. In the Jobs workbench, the \u201cno search yet\u201d state now explicitly tells the operator to run a manual search, and the Jobs screen now has a real `Run manual search` action that calls the new endpoint and shows outcome feedback instead of implying a page refresh performs discovery. I also extended preflight route smoke coverage and added focused runtime/workbench tests for the new behavior.\n\n2. Exact files changed\n\n- `api/routes/search_runs.py`\n- `ui/app.py`\n- `ui/screens/jobs.py`\n- `tests/test_production_runtime.py`\n- `tests/test_workbench.py`\n- `scripts/preflight_check.sh`\n\n3. Exact tests added or updated\n\nAdded:\n- `test_manual_search_http_endpoint_runs_sync_and_returns_payload`\n- `test_build_search_state_view_model_reports_manual_trigger_when_no_run_exists`\n- `test_build_manual_search_feedback_reports_surfaced_jobs`\n- `test_build_manual_search_feedback_reports_zero_yield_summary`\n\nUpdated:\n- `test_search_runs_latest_endpoint_is_registered`\n\n4. Exact commands run\n\n```bash\npytest tests/test_production_runtime.py tests/test_workbench.py\n./scripts/preflight_check.sh\nif [ -x .venv_validation/bin/python ]; then .venv_validation/bin/python scripts/reset_demo.py; elif [ -x .venv/bin/python ]; then .venv/bin/python scripts/reset_demo.py; else python3 scripts/reset_demo.py; fi\nif [ -x .venv_validation/bin/python ]; then .venv_validation/bin/python -m uvicorn api.main:app --host 127.0.0.1 --port 8000; elif [ -x .venv/bin/python ]; then .venv.bin/python -m uvicorn api.main:app --host 127.0.0.1 --port 8000; else python3 -m uvicorn api.main:app --host 127.0.0.1 --port 8000; fi\nif [ -x .venv_validation/bin/python ]; then .venv_validation/bin/python -m streamlit run ui/app.py --server.headless true --server.address 127.0.0.1 --server.port 85