on_runtime.py tests/test_workbench.py`: passed, `53 passed in 1.78s`\n- `./scripts/preflight_check.sh`: passed, including compile/import smoke and full suite `179 passed in 6.58s`\n- `./scripts/runtime_self_check.sh`: exited successfully as a script, but all local curl probes failed because no local services were running yet\n- `.venv_validation/bin/python scripts/reset_demo.py`: succeeded and reseeded demo data\n- `.venv_validation/bin/uvicorn api.main:app --host 127.0.0.1 --port 8000`: failed to bind `127.0.0.1:8000` with `[Errno 1] operation not permitted`\n- `.venv_validation/bin/streamlit run ui/app.py --server.headless true --server.address 127.0.0.1 --server.port 8500`: failed to bind `127.0.0.1:8500` with `PermissionError: [Errno 1] Operation not permitted`\n\n6. Honest note on what remains unproven\n\nLive runtime review of the jobs-first shell remains unproven in this environment. I attempted the required FastAPI and Streamlit boot steps, but the sandbox blocks local port binding, so I could not complete an actual on-screen review of the updated Streamlit hierarchy or rerun endpoint checks against a live local server."
