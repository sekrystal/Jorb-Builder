        "detail": "1. Concise summary of exactly what changed\n\nUX Design Section Mapping: App shell -> Vite/React/TypeScript shell with routed layout frame; Primary jobs entry -> `/jobs` default route; Secondary Streamlit path -> `/validation-harness` page that explicitly points to Streamlit as the temporary harness.  \nUX Intentional Design Deviations: skeletal production shell only; Streamlit intentionally remains the home for operator and diagnostic surfaces during the bootstrap phase.  \nUX Product-First Checklist: hierarchy=yes, prohibited_surfaces=yes, backend_wiring_only=no.\n\nAdded a new production JS shell under `frontend/` with a product-first route hierarchy, a shared fetch client wired to the existing FastAPI backend, and a local Vite proxy for `/api` to `127.0.0.1:8000`. Documented the JS-vs-Streamlit split in `README.md` and `OPERATIONS.md`, and updated runtime tests to assert the shell stays product-facing and backend-wired.\n\n2. Exact files changed\n\n- `README.md`\n- `OPERATIONS.md`\n- `tests/test_production_runtime.py`\n- `frontend/index.html`\n- `frontend/package.json`\n- `frontend/tsconfig.app.json`\n- `frontend/tsconfig.json`\n- `frontend/tsconfig.node.json`\n- `frontend/vite.config.ts`\n- `frontend/src/lib/api.ts`\n- `frontend/src/main.tsx`\n- `frontend/src/router.tsx`\n- `frontend/src/shell/AppShell.tsx`\n- `frontend/src/styles.css`\n- `frontend/src/views/LeadPages.tsx`\n- `frontend/src/views/ProfilePage.tsx`\n- `frontend/src/views/ValidationHarnessPage.tsx`\n- `frontend/src/vite-env.d.ts`\n\n3. Exact tests added or updated\n\nUpdated `tests/test_production_runtime.py`:\n- `test_frontend_shell_uses_product_first_routes_and_streamlit_secondary_path`\n- `test_frontend_shell_dev_wiring_targets_existing_fastapi_backend`\n\n4. Exact commands run\n\n- `python3 scripts/reset_demo.py`\n- `python3 -m pytest tests/test_workbench.py tests/test_production_runtime.py`\n- `ls -1 .venv .venv_validation .venv_j1 2>/dev/null`\n- `./scripts/preflight_check.