        "detail": "1. Concise summary of exactly what changed\n\nUX Design Section Mapping: `Profile preferences -> shared lightweight settings form in onboarding and Profile`; `Optional onboarding -> new skippable /welcome entry path that can be bypassed into /jobs`\nUX Intentional Design Deviations: onboarding only captures `target roles`, `preferred geography`, and `work mode`; deeper profile setup remains deferred\nUX Product-First Checklist: hierarchy=yes, prohibited_surfaces=yes, backend_wiring_only=no\n\nThe JS shell now has a lightweight, skippable onboarding flow at `/welcome` with `Skip to jobs` and `Save and open jobs`, while `/jobs` remains directly reachable. The old placeholder Profile page was replaced with a real editable settings surface, backed by `/candidate-profile`, focused on `target_roles_json`, `preferred_locations_json`, and `work_mode_preference` so those preferences materially shape search and ranking without heavyweight setup.\n\n2. Exact files changed\n\n- `README.md`\n- `frontend/src/lib/api.ts`\n- `frontend/src/router.tsx`\n- `frontend/src/shell/AppShell.tsx`\n- `frontend/src/styles.css`\n- `frontend/src/views/ProfilePage.tsx`\n- `frontend/src/views/OnboardingPage.tsx`\n- `frontend/src/views/ProfileEditor.tsx`\n- `tests/test_profile.py`\n\n3. Exact tests added or updated\n\n- Added `test_update_candidate_profile_from_flat_targeting_fields_sets_explicit_search_preferences` in `tests/test_profile.py`\n\n4. Exact commands run\n\n- `pytest tests/test_profile.py tests/test_workbench.py`\n- `./scripts/preflight_check.sh`\n- `npm run build`\n- `/Users/samuelkrystal/projects/jorb/.venv_validation/bin/python scripts/reset_demo.py`\n- `/Users/samuelkrystal/projects/jorb/.venv_validation/bin/python -m uvicorn api.main:app --host 127.0.0.1 --port 8000`\n- `npm run dev -- --host 127.0.0.1 --port 5173`\n- `pytest tests/test_profile.py tests/test_workbench.py`\n- `./scripts/preflight_check.sh`\n\n5. Exact results\n\n- `pytest tests/test_profile.py te