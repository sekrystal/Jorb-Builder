ch.py\npython3 -m py_compile ui/app.py ui/components/sidebar.py ui/components/topbar.py ui/components/job_card.py ui/screens/jobs.py\n./scripts/preflight_check.sh\npython3 scripts/reset_demo.py\n./.venv_validation/bin/python scripts/reset_demo.py\n./.venv_validation/bin/python -m uvicorn api.main:app --host 127.0.0.1 --port 8000\n./.venv_validation/bin/streamlit run ui/app.py --server.headless true --server.address 127.0.0.1 --server.port 8500\ncurl -s http://127.0.0.1:8000/search-runs/latest\ncurl -s 'http://127.0.0.1:8000/leads?freshness_window_days=14'\ncurl -I http://127.0.0.1:8500\n```\n\n5. Exact results\n\n- `pytest tests/test_production_runtime.py tests/test_workbench.py`: passed, `66 passed in 2.80s`\n- `python3 -m py_compile ...`: passed\n- `./scripts/preflight_check.sh`: passed, `207 passed in 8.17s`\n- `python3 scripts/reset_demo.py`: failed with `ModuleNotFoundError: No module named 'sqlalchemy'`\n- `./.venv_validation/bin/python scripts/reset_demo.py`: passed; demo reset reported `signals_ingested=4`, `listings_ingested=7`, `leads_updated=8`, `surfaced_count=5`, `live_mode_used=false`\n- `./.venv_validation/bin/python -m uvicorn api.main:app --host 127.0.0.1 --port 8000`: failed to bind `127.0.0.1:8000` with `operation not permitted`\n- `./.venv_validation/bin/streamlit run ui/app.py --server.headless true --server.address 127.0.0.1 --server.port 8500`: failed to bind `127.0.0.1:8500` with `PermissionError: [Errno 1] Operation not permitted`\n- `curl -s http://127.0.0.1:8000/search-runs/latest`: failed, exit code `7`\n- `curl -s 'http://127.0.0.1:8000/leads?freshness_window_days=14'`: failed, exit code `56`\n- `curl -I http://127.0.0.1:8500`: failed with `curl: (56) Recv failure: Connection reset by peer`\n\n6. Honest note on what remains unproven\n\nLive runtime proof remains unproven in this environment because the sandbox would not allow FastAPI or Streamlit to bind to `127.0.0.1:8000` or `127.0.0.1:8500`. That means I could not complete the repo-re