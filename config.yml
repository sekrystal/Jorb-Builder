{
  "builder": {
    "name": "jorb-builder-v1",
    "version": 1
  },
  "paths": {
    "product_repo": "~/projects/jorb",
    "builder_root": "~/projects/jorb-builder",
    "run_logs": "~/projects/jorb-builder/run_logs",
    "task_history": "~/projects/jorb-builder/task_history",
    "blockers": "~/projects/jorb-builder/blockers"
  },
  "execution": {
    "max_retries_per_task": 2,
    "default_prompt": "implement_feature",
    "debug_prompt": "debug_failure"
  },
  "automation": {
    "mode": "explicit_script",
    "preserve_step_logs": true
  },
  "executor": {
    "command": null,
    "shell": "/bin/zsh",
    "timeout_seconds": 1800
  },
  "git": {
    "require_clean_worktree": true,
    "commit_message_template": "{task_id}: {title}",
    "push_command": "git push"
  },
  "vm": {
    "ssh_target": null,
    "ssh_options": [],
    "product_repo": "~/projects/jorb",
    "pull_command": "git pull --ff-only",
    "validation_commands": [],
    "runtime_validation_commands": []
  },
  "verification": {
    "default_check_group": "targeted",
    "required_on_completion": ["preflight"]
  },
  "rules": {
    "forbid_builder_code_in_product_repo": true,
    "require_explicit_allowlist": true,
    "require_explicit_verification": true,
    "require_exact_return_format": true,
    "allow_only_jorb_repo_edits": true
  },
  "codex": {
    "worker": "vscode",
    "mode": "manual_packet"
  }
}
